<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe Store Login & Sign-Up</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <!-- Custom styles -->
  <style>
    body {
      background-image: url('https://www.woodlandworldwide.com/landing/hero_banner_1.webp');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 15px;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      width: 100%;
      padding: 40px;
      margin-right: 20px;
    }
    .card-header {
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 15px 15px 0 0;
      color: #333;
      text-align: center;
      padding: 20px 0;
      margin-bottom: 30px;
      font-size: 28px;
    }
    .card-body {
      padding: 0 20px 20px;
    }
    .form-control {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 12px 15px;
      margin-bottom: 20px;
    }
    .btn-primary {
      background-color: #007bff;
      border: none;
      border-radius: 5px;
      padding: 12px 20px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .btn-primary:hover {
      background-color: #0056b3;
    }
    .btn-primary:focus {
      box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.5);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-check-label {
      font-weight: normal;
    }
    .forgot-password {
      text-align: right;
      font-size: 14px;
      color: #333;
      cursor: pointer;
    }
    .toggle-link {
      text-align: center;
      cursor: pointer;
      color: #007bff;
      font-size: 16px;
    }
    .toggle-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card">
      <div class="card-header" id="formTitle">Login</div>
      <div class="card-body">
        <form id="authForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
          </div>
          <div class="form-group form-check" id="rememberDiv">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="submitButton">Login</button>
          <div class="forgot-password">
            <a href="#">Forgot password?</a>
          </div>
          <div class="toggle-link" id="toggleForm">Don't have an account? Sign Up</div>
        </form>
      </div>
    </div>
  </div>
  
  <!-- Bootstrap JS and dependencies -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  
  <!-- Custom script for handling form submission and toggling between login and sign-up -->
  <script>
    $(document).ready(function() {
      let isLogin = true;
      
      function validateEmail(email) {
        var pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return pattern.test(email);
      }
      
      function validatePassword(password) {
        return password.length >= 8;
      }

      function handleLogin() {
        var email = $('#email').val().toLowerCase().trim();
        var password = $('#password').val().trim();
        
        if (validateEmail(email) && validatePassword(password)) {
          window.location.href = 'file:///D:/st%20project/st%20project/index.html';
        } else {
          alert('Invalid email or password. Please try again.');
        }
      }

      function handleSignUp() {
        var email = $('#email').val().toLowerCase().trim();
        var password = $('#password').val().trim();
        
        if (validateEmail(email) && validatePassword(password)) {
          alert('Sign-Up successful!');
          window.location.href = 'file:///D:/st%20project/st%20project/index.html';
        } else {
          alert('Invalid email or password. Please try again.');
        }
      }

      $('#authForm').submit(function(event) {
        event.preventDefault();
        if (isLogin) {
          handleLogin();
        } else {
          handleSignUp();
        }
      });

      $('#toggleForm').click(function() {
        if (isLogin) {
          $('#formTitle').text('Sign Up');
          $('#submitButton').text('Sign Up');
          $('#toggleForm').text('Already have an account? Login');
          $('#rememberDiv').hide();
        } else {
          $('#formTitle').text('Login');
          $('#submitButton').text('Login');
          $('#toggleForm').text('Don\'t have an account? Sign Up');
          $('#rememberDiv').show();
        }
        isLogin = !isLogin;
      });
    });
  </script>
</body>
</html>
