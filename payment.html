<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Shoe Store</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        .payment-container {
            margin-top: 80px;
            text-align: center;
        }
        .payment-form {
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Elite Shoe</a>
        </div>
    </nav>

    <div class="container payment-container">
        <h2>Payment Procedure</h2>
        
        <p>Your total amount is: <span id="totalAmount"></span></p>
        <form id="paymentForm" class="payment-form">
            <div class="form-group">
                <label for="paymentMethod">Payment Method</label>
                <select class="form-control" id="paymentMethod" required>
                    <option value="" disabled selected>Select payment method</option>
                    <option value="card">Card</option>
                    <option value="upi">UPI</option>
                </select>
            </div>
            <div id="cardDetails" style="display:none;">
                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                    <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456">
                </div>
                <div class="form-group">
                    <label for="expiryDate">Expiry Date</label>
                    <input type="text" class="form-control" id="expiryDate" placeholder="MM/YY">
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" class="form-control" id="cvv" placeholder="123">
                </div>
            </div>
            <div id="upiDetails" style="display:none;">
                <div class="form-group">
                    <label for="upiId">UPI ID</label>
                    <input type="text" class="form-control" id="upiId" placeholder="example@upi">
                </div>
            </div>
            <button type="submit" class="btn btn-success">Pay Now</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        function getCartItems() {
            return JSON.parse(localStorage.getItem('cartItems')) || [];
        }

        function calculateTotal() {
            const cartItems = getCartItems();
            return cartItems.reduce((total, item) => total + parseFloat(item.price), 0);
        }

        function displayTotalAmount() {
            const totalAmount = calculateTotal();
            document.getElementById('totalAmount').innerText = `Rs ${totalAmount.toFixed(2)}`;
        }

        function processPayment(event) {
            event.preventDefault();
            const paymentMethod = document.getElementById('paymentMethod').value;
            const cardNumber = document.getElementById('cardNumber').value;
            const expiryDate = document.getElementById('expiryDate').value;
            const cvv = document.getElementById('cvv').value;
            const upiId = document.getElementById('upiId').value;

            if (paymentMethod === 'card' && cardNumber && expiryDate && cvv) {
                // Simulate card payment processing
                alert('Card Payment successful!');
                localStorage.removeItem('cartItems');
                window.location.href = 'payment_success.html';
            } else if (paymentMethod === 'upi' && upiId) {
                // Simulate UPI payment processing
                alert('UPI Payment successful!');
                localStorage.removeItem('cartItems');
                window.location.href = 'payment_success.html';
            } else {
                alert('Please fill out the required payment details.');
            }
        }

        document.getElementById('paymentForm').onsubmit = processPayment;

        document.getElementById('paymentMethod').addEventListener('change', function() {
            const paymentMethod = this.value;
            document.getElementById('cardDetails').style.display = paymentMethod === 'card' ? 'block' : 'none';
            document.getElementById('upiDetails').style.display = paymentMethod === 'upi' ? 'block' : 'none';
        });

        window.onload = function () {
            displayTotalAmount();
        };
    </script>
</body>
</html>
